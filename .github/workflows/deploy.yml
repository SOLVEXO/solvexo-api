name: Deploy solvexo-api

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /home/deploy/apps/solvexo-api
            git pull origin main
            npm ci
            npm run build
            pm2 restart solvexo-api-staging || pm2 start dist/main.js --name "solvexo-api-staging"
            pm2 save
            echo "solvexo-api deployed"
